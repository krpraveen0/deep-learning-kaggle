name: Deploy Notebooks to Kaggle

on:
  push:
    branches:
      - main
    paths:
      - 'module-*/**'
      - '.github/workflows/deploy-to-kaggle.yml'

  workflow_dispatch:
    inputs:
      module:
        description: 'Module to deploy (e.g. module-01-intro). Leave blank for auto mode.'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Push notebooks to Kaggle
    env:
      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Kaggle CLI
        run: pip install 'kaggle>=1.8.0'

      - name: Configure Kaggle credentials
        run: |
          if [ -z "$KAGGLE_USERNAME" ] || [ -z "$KAGGLE_KEY" ]; then
            echo "KAGGLE_USERNAME or KAGGLE_KEY is not set in GitHub Secrets"
            exit 1
          fi

          umask 077
          mkdir -p ~/.kaggle
          python3 -c "import json,os; open(os.path.expanduser('~/.kaggle/kaggle.json'),'w',encoding='utf-8').write(json.dumps({'username': os.environ.get('KAGGLE_USERNAME',''), 'key': os.environ.get('KAGGLE_KEY','')}))"
          printf '%s' "$KAGGLE_KEY" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/kaggle.json ~/.kaggle/access_token
          echo "KAGGLE_CONFIG_DIR=$HOME/.kaggle" >> "$GITHUB_ENV"
          echo "Configured Kaggle auth (username length: ${#KAGGLE_USERNAME})"

      - name: Verify Kaggle authentication
        run: |
          kaggle kernels list -m | head -n 5

      - name: Normalize metadata for Kaggle compatibility
        run: |
          # Remove optional keywords field (rejected by Kaggle) and ensure
          # boolean fields are actual JSON booleans, not strings.
          # String "false"/"true" passed to the Kaggle SDK is coerced via
          # Python's bool(), where bool("false") == True, so notebooks
          # pushed with "is_private": "false" are actually marked private.
          for META in $(find . -maxdepth 2 -path './module-*' -name "kernel-metadata.json"); do
            python3 - "$META" <<'PYEOF'
import json, sys
p = sys.argv[1]
d = json.load(open(p, 'r', encoding='utf-8'))
d.pop('keywords', None)
for field in ('is_private', 'enable_gpu', 'enable_internet'):
    if field in d and isinstance(d[field], str):
        val = d[field].strip().lower()
        if val not in ('true', 'false'):
            print(f'WARNING: unexpected value for {field} in {p}: {d[field]!r} (treating as false)', flush=True)
        d[field] = val == 'true'
open(p, 'w', encoding='utf-8').write(json.dumps(d, indent=2) + '\n')
PYEOF
            echo "Normalized metadata: $META"
          done

      - name: Deploy single module (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.module != ''
        run: |
          MODULE="${{ github.event.inputs.module }}"

          if [ ! -d "$MODULE" ]; then
            echo "Module folder not found: $MODULE"
            exit 1
          fi

          if [ ! -f "$MODULE/notebook.ipynb" ] || [ ! -f "$MODULE/kernel-metadata.json" ]; then
            echo "Missing notebook.ipynb or kernel-metadata.json in $MODULE"
            exit 1
          fi

          echo "Deploying $MODULE..."
          PUSH_OUTPUT=$(kaggle kernels push -p "./$MODULE" 2>&1)
          echo "$PUSH_OUTPUT"
          if echo "$PUSH_OUTPUT" | grep -qi "kernel push error\|error:"; then
            echo "Deploy failed for $MODULE"
            exit 1
          fi
          echo "$MODULE deployed"

      - name: Deploy changed modules (auto)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.module == '')
        run: |
          MODULES=$(find . -maxdepth 1 -type d -name 'module-*' | sort)

          if [ -z "$MODULES" ]; then
            echo "No module-* folders found."
            exit 0
          fi

          DEPLOYED=0
          FAILED=0

          for MODULE in $MODULES; do
            MODULE_NAME=$(basename "$MODULE")

            if [ ! -f "$MODULE/notebook.ipynb" ] || [ ! -f "$MODULE/kernel-metadata.json" ]; then
              echo "Skipping $MODULE_NAME (notebook.ipynb or kernel-metadata.json missing)"
              continue
            fi

            if [ "${{ github.event_name }}" = "push" ]; then
              CHANGED=$(git diff --name-only HEAD~1 HEAD -- "$MODULE/" | wc -l)
              if [ "$CHANGED" -eq 0 ]; then
                echo "Skipping $MODULE_NAME (no changes)"
                continue
              fi
            fi

            echo "Deploying $MODULE_NAME..."
            PUSH_OUTPUT=$(kaggle kernels push -p "$MODULE" 2>&1)
            echo "$PUSH_OUTPUT"
            if echo "$PUSH_OUTPUT" | grep -qi "kernel push error\|error:"; then
              echo "Failed to deploy $MODULE_NAME (error in push output)"
              FAILED=$((FAILED + 1))
            else
              echo "$MODULE_NAME deployed successfully"
              DEPLOYED=$((DEPLOYED + 1))
            fi

            sleep 3
          done

          echo "--------------------------------"
          echo "Deployed: $DEPLOYED module(s)"
          echo "Failed:   $FAILED module(s)"
          echo "--------------------------------"

          if [ "$FAILED" -gt 0 ]; then
            exit 1
          fi

      - name: Check kernel statuses
        if: success()
        run: |
          echo "Checking kernel statuses..."
          sleep 15

          for META in $(find . -maxdepth 2 -path './module-*' -name "kernel-metadata.json"); do
            KERNEL_ID=$(python3 -c "import json; print(json.load(open('$META')).get('id',''))" 2>/dev/null)
            if [ -n "$KERNEL_ID" ]; then
              echo "Status for $KERNEL_ID"
              kaggle kernels status "$KERNEL_ID" || true
            fi
          done
