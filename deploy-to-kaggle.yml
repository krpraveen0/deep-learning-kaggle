name: Deploy Notebooks to Kaggle

on:
  push:
    branches:
      - main
    paths:
      - 'module-*/**'          # Only trigger when a module folder changes

  workflow_dispatch:           # Allow manual trigger from GitHub UI
    inputs:
      module:
        description: 'Module to deploy (e.g. module-01-intro). Leave blank for ALL.'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Push notebooks to Kaggle

    steps:
      # ── 1. Checkout your repo ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2          # Need previous commit to detect changed files

      # ── 2. Set up Python ──────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install Kaggle CLI ─────────────────────────────────────────
      - name: Install Kaggle CLI
        run: pip install kaggle

      # ── 4. Configure Kaggle credentials ───────────────────────────────
      # Store KAGGLE_USERNAME and KAGGLE_KEY as GitHub Secrets:
      #   Settings → Secrets → Actions → New repository secret
      - name: Configure Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      # ── 5a. Deploy a SINGLE module (manual trigger with module name) ───
      - name: Deploy single module (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.module != ''
        run: |
          MODULE="${{ github.event.inputs.module }}"
          echo "📦 Deploying $MODULE..."
          kaggle kernels push -p "./$MODULE"
          echo "✅ $MODULE deployed!"

      # ── 5b. Deploy ALL changed modules (auto on push to main) ─────────
      - name: Deploy changed modules (auto)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.module == '')
        run: |
          # Find all module directories that have a kernel-metadata.json
          MODULES=$(find . -name "kernel-metadata.json" -exec dirname {} \; | sort)

          if [ -z "$MODULES" ]; then
            echo "No modules found."
            exit 0
          fi

          DEPLOYED=0
          FAILED=0

          for MODULE in $MODULES; do
            MODULE_NAME=$(basename "$MODULE")

            # On push: only deploy modules that changed in this commit
            if [ "${{ github.event_name }}" = "push" ]; then
              CHANGED=$(git diff --name-only HEAD~1 HEAD -- "$MODULE/" | wc -l)
              if [ "$CHANGED" -eq 0 ]; then
                echo "⏭️  Skipping $MODULE_NAME (no changes)"
                continue
              fi
            fi

            echo "📦 Deploying $MODULE_NAME..."
            if kaggle kernels push -p "$MODULE"; then
              echo "✅ $MODULE_NAME deployed successfully"
              DEPLOYED=$((DEPLOYED + 1))
            else
              echo "❌ Failed to deploy $MODULE_NAME"
              FAILED=$((FAILED + 1))
            fi

            # Wait between pushes to respect Kaggle rate limits
            sleep 5
          done

          echo ""
          echo "═══════════════════════════"
          echo "  Deployed: $DEPLOYED modules"
          echo "  Failed:   $FAILED modules"
          echo "═══════════════════════════"

          if [ "$FAILED" -gt 0 ]; then
            exit 1
          fi

      # ── 6. Check deployment status ────────────────────────────────────
      - name: Check kernel statuses
        if: success()
        run: |
          echo "Checking kernel run statuses (may take a minute)..."
          sleep 30

          # Read all kernel IDs and check status
          for META in $(find . -name "kernel-metadata.json"); do
            KERNEL_ID=$(python3 -c "import json; d=open('$META').read(); print(json.loads(d)['id'])" 2>/dev/null)
            if [ -n "$KERNEL_ID" ]; then
              echo "📊 Status for $KERNEL_ID:"
              kaggle kernels status "$KERNEL_ID" || true
            fi
          done
